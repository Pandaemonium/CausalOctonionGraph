notes: |
  Crucial to show that V, S+, S- are chemically distinct in the graph (e.g.,
  different tick frequencies or connectivity rules) to explain why they aren't
  just relabelings of the same physics.

  New finite gate checks (Lean, 2026-02-24):
  - Distinct Witt pairs lie on distinct Fano lines (`wittPairs_on_distinct_lines`).
  - The orientation-preserving cyclic map of Witt pairs is a Fano automorphism
    (`wittPair_cyclic_perm_is_fano_aut`).
  - A closely related cycle with one internal pair flip is NOT a Fano
    automorphism (`wittPair_cyclic_perm_flip_not_fano_aut`).
  - Generation-sector states are pairwise distinct
    (`gen1_ne_gen2`, `gen1dual_ne_gen2`, `gen1_ne_gen1dual`).
  - Vacuum-stabilizer action on Witt-pair labels is explicit and exhaustive:
    `wittPair_cyclic_in_vacuumStabilizerList`, `wittPair_cyclic_inducedColorPerm`,
    `inducedColorPerms_count`, `inducedColorPerms_perm_S3`,
    `color_perm_realized_by_vacuum_stabilizer`.
  - Structural quotient checks landed:
    `inducedColorPerm_hom_on_vacuumStabilizer_bool`,
    `stabilizerKernelList_count`, `stabilizerKernel_normal_bool`,
    `stabilizer_kernel_index_six`.
  - A concrete transposition witness exists inside the stabilizer:
    `wittPair_swap01_in_vacuumStabilizer` and
    `wittPair_swap01_inducedColorPerm`.
  - The same stabilizer also acts as full S4 on the 4 non-vacuum Fano lines,
    with faithful action (`inducedNonVacLinePerms_perm_S4`,
    `inducedNonVacLinePerm_faithful_bool`).
  - An explicit list-level S4 isomorphism witness is now present
    (`vacuumStabilizer_explicit_iso_S4_bool`).

  Full Spin(8)-representation-level mapping remains open.
