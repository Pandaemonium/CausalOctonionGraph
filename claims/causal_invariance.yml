  separated events), then the resulting causal set converges to a Lorentz-

  covariant manifold in the large-N limit. The speed-of-light bound

  c_eff = edge_len / tick_rate emerges from the causal graph structure,

  and the Lorentz factor gamma(v) is reproduced to leading order by the

  causal path-count ratio.

