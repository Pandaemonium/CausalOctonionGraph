id: STRONG-001
title: "Strong coupling leading-order proxy from vacuum stabilizer ratio"
statement: |
  The current COG leading-order proxy for the strong coupling is:
      alpha_s_proxy = |Stab(e7)| / |Aut(Fano)| = 24/168 = 1/7.

  This is a formally proved baseline, not a complete physical derivation.
  The measured Z-pole value (~0.118) is lower; the residual gap is tracked
  explicitly and requires a correction mechanism (for example, finite-density
  trapped/escaped mixing and/or scale bridge).
status: partial
lean_file: CausalGraphTheory/GaugeObservables.lean
lean_theorems:
  - CausalGraph.alpha_s_proxy_eq
  - CausalGraph.alpha_s_proxy_bounds
  - CausalGraph.orbit_stabilizer_ratio
  - CausalGraph.gauge_group_factored
  - CausalGraph.alpha_s_proxy_overestimates
  - CausalGraph.alpha_s_gap_eq
  - CausalGraph.alpha_s_gap_pos
python_test: calc/test_constants.py::test_alpha_strong_candidate
depends_on:
  - GAUGE-001
  - FANO-001
literature:
  - "PDG 2024: alpha_s(M_Z) around 0.118"
  - "Bethke (2006): alpha_s measurements, arXiv:hep-ex/0606035"
  - "Asymptotic freedom and running coupling literature"
notes: |
  LOCKED LEAN BASELINE:
    alpha_s_proxy = 1/7 (exact)
    alpha_s_physical = 1181/10000 (declared comparison value)
    alpha_s_gap = alpha_s_proxy - alpha_s_physical = 1733/70000 > 0

  Interpretation:
    COG currently overestimates the Z-pole value at leading order.
    This is documented as an open correction problem, not tuned away.

  Governance:
    No projector or ratio edits may be made post-hoc to force agreement.
    Gap-closure work must be via predeclared correction terms and
    reproducible ablation tests.

  Execution tracking:
    rfc/STRONG-001_Closure_Tasklist.md
blocked_reason: |
  Leading-order proxy is proved, but the correction mechanism for the
  measured value is still open. Keep status partial until correction
  model + uncertainty + scale declaration are closed.
