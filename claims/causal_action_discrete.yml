id: CFS-001
title: "Discrete causal action for finite octonionic causal graphs"
statement: |
  There exists a finite, computable causal-action functional S on COG graph
  microstates (nodes, labeled edges, and octonionic states) such that each
  deterministic update step is defined by local action comparison with no
  continuum limit assumptions.

