notes: |
  KEY FINDING (search 2026-02-23):
    S3 IS an automorphism of the Cayley-Dickson sedenions S.
    S3 is NOT an automorphism of the octonions O.
    This is the algebraic discriminant between 1 and 3 generations.

    The Gresnigt construction (2306.13098):
    1. Represent ONE generation using two minimal left ideals of Cl(6),
       generated from a subset of left actions of C@S on itself.
    2. The single-generation construction uses all three O subalgebras of S
       to build one generation (generalizing Furey's use of three H in O).
    3. The S3 automorphism of order 3 maps (O1, O2, O3) -> (O2, O3, O1),
       generating two additional generations.
    4. All three generations transform under ONE copy of SU(3)_C
       (no three copies of gluons â€” a major improvement).

  COG RELEVANCE:
    COG currently uses C@O only (8-dimensional complex octonionic space).
    The sedenion extension C@S is 16-dimensional.
    The three-generation structure requires the S3 automorphism, which
    lives at the SEDENION level, not the octonionic level.

    This explains why COG's single-octonionic update rule cannot generate
    three distinct generations in-algebra: the generational discriminant
    (S3 âŠ‚ Aut(S) \ Aut(O)) is structurally above the octonionic layer.

  CONNECTION TO KOIDE-001:
    The S3 group has Z3 as a normal subgroup (S3 = Z3 â‹Š Z2).
    This Z3 is the symmetry needed for the Brannen parametrization
    f_k = A + B*cos(phi + 2*pi*k/3) in claims/koide_exactness.yml.
    If the S3 automorphism acts on the lepton mass eigenvalues as Z3,
    it forces the equal phase-spacing (sum c_k = 0, sum c_j*c_k = -3/4)
    that is the COG-side Koide Z3 ansatz.

  OBSTACLES:
    - COG uses C@O (8D); S3 lives at C@S (16D). Bridge undefined.
    - The sedenions are neither division algebras nor alternative.
    - The non-alternativity of S may break COG's Alternativity Theorem
      (which is the origin of discrete ticking from the non-associativity of O).
    - McRae Â§5 obstruction (representation-level automorphisms vs algebra-
      level automorphisms) may apply here too.

  OPEN QUESTIONS:
    1. Can S3 act as a TOPOLOGICAL symmetry of the COG DAG without requiring
       the full sedenion algebra (i.e., S3 on graph topology, not on states)?
    2. Can the sedenion C@S construction be approximated within C@O by using
       the three Witt-basis pairs (e6,e1), (e2,e5), (e3,e4) as the "three
       O subalgebras" that S3 permutes?
    3. If yes to (2), does the COG DAG edge rule automatically generate an
       S3 symmetry over the three Witt-pair directions?

  STATUS NOTE (2026-02-23):
    Created as stub. The Gresnigt mechanism is the strongest algebraic
    result in the literature for the three-generation origin question.
    It is not directly implementable in COG without extending to C@S.
    The Witt-pair question (open question 2) is the COG-native research direction.

  PARTIAL RESULT (2026-02-24, updated):
    1) Point-level gates (WittPairSymmetry.lean):
       - wittPair_cyclic_perm_is_fano_aut:
         The orientation-preserving cyclic map (Pair0 -> Pair1 -> Pair2 -> Pair0)
         is a Fano automorphism.
       - wittPair_cyclic_perm_flip_not_fano_aut:
         A specific flip-style candidate map is not a Fano automorphism.

    2) Stabilizer-induced color action (VacuumStabilizerAction.lean):
       - wittPair_cyclic_in_vacuumStabilizerList:
         The cycle element is explicitly present in the 24-element vacuum stabilizer.
       - wittPair_cyclic_inducedColorPerm:
         Its induced color action is [0,1,2] -> [1,2,0].
       - inducedColorPerms_perm_S3 + color_perm_realized_by_vacuum_stabilizer:
       The full vacuum stabilizer induces all 6 permutations of the 3 Witt-pair labels.

    3) Quotient structure checks (VacuumStabilizerQuotient.lean):
       - inducedColorPerm_hom_on_vacuumStabilizer_bool:
         finite homomorphism check for the induced action.
       - stabilizerKernelList_count + stabilizerKernel_normal_bool:
         kernel has size 4 and is normal.
       - stabilizer_kernel_index_six:
         quotient cardinality is 6.
       - wittPair_swap01_in_vacuumStabilizer + wittPair_swap01_inducedColorPerm:
         an explicit transposition is realized in the stabilizer action.
       - inducedNonVacLinePerms_perm_S4 + inducedNonVacLinePerm_faithful_bool:
         the same stabilizer acts as full S4 on the four non-vacuum Fano lines.
       - vacuumStabilizer_explicit_iso_S4_bool:
         explicit lift and left/right inverse checks complete a concrete
         list-level isomorphism witness to S4.

    Interpretation:
    - A specific pointwise "flip candidate" can fail to be an automorphism while
      the stabilizer still realizes full S3 on unordered Witt-pair labels.
    - Therefore C@O has a proved internal S3 label action at the vacuum-stabilizer level.
    - What remains open is the state-level generation mechanism claimed for C@S
      (sedenions), and whether that lift is definable inside octonion-only COG dynamics.

blocked_reason: |
  The stabilizer-level S3 action on Witt-pair labels is proved.
  Remaining blocker: derive a physically meaningful generation operator on full
  fermion state sectors from this discrete action, and connect it (or rule it out)
  against the sedenion-level S3 mechanism in the Gresnigt construction.

  NUMERICAL DIAGNOSIS (2026-02-26, test run in sedenion_gen.py):
    - The Cayley-Dickson 4-doubling sedenion algebra has exactly 35 unordered
      Witt triples (i.e. triples {i,j,k} with e_i*e_j = Â±e_k, all distinct and >0).
    - The arithmetic partition G0={1..5}, G1={6..10}, G2={11..15} is NOT algebraically
      closed: applying S3 permutations on these groups does NOT map Witt triples to
      Witt triples (cross-products of lower and upper halves break the partition).
    - Result: 32 singleton orbits (instead of 3), 7 membership patterns (instead of 3),
      172 labeled orbits.
    - TestThreeGenerations tests marked xfail with strict=True pending resolution.

  REQUIRED: Either identify the algebraically natural 3-partition of the 15 sedenion
  imaginaries that is preserved by the Witt-triple structure, or re-define the S3 action
  in terms of Gresnigt's 4 octonion subalgebras of S rather than arithmetic groups.


