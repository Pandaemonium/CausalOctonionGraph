id: ALG-004
title: "Witt basis ladder operators"
statement: |
  The operators α_j and α_j† generate the Clifford algebra Cl(6) ≅ Cl(0,6).
  They satisfy {α_j, α_k†} = δ_jk and {α_j, α_k} = 0.
  The vacuum state ω is annihilated by all α_j.
