id: GAUGE-001
title: "Emergence of Standard Model Gauge Group G_SM"
statement: |
  The subgroup of automorphisms of the octonion algebra O that fixes a specific
  imaginary unit (the vacuum axis e_7) is isomorphic to SU(3).
  The subgroup of automorphisms of the complex octonions C x O that preserves
  the Witt basis structure is G_SM = SU(3) x SU(2) x U(1) / Z_6.
status: stub
lean_file: CausalGraphTheory/GaugeGroup.lean
lean_theorems:
