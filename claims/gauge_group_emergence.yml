  - OCT-001
literature:
  - "Gunaydin & Gursey (1973): Quark structure and octonions"
  - "Furey (2016): Standard model physics from an algebra?"
  - "Todorov (2019): Exceptional quantum algebra for the standard model"
notes: |
  The derivation must be purely algebraic. The U(1) factor comes from the
  complex phase symmetry of the ladder operators. The SU(2) comes from the
  quaternion subalgebra of the weak sector.
