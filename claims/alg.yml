- id: ALG-002
  title: Octonion Multiplication is Alternative
  status: proved
  pi_obs_profile: minimal
  pi_obs_profile_version: v1
  projection_sensitivity: unknown
  profile_contrast_run: ""
  equivalence_mode: none
  lean_file: CausalGraphTheory/Octonions.lean
  theorems:
    - oct_left_alternative
    - oct_right_alternative
  description: >
    The octonion algebra satisfies the left alternative law (x·x)·y = x·(x·y)
    and the right alternative law x·(y·y) = (x·y)·y for all x, y in O.
    Proved by decidable enumeration over all 64 basis pairs.
  pedagogy: pedagogy/alg-002.md
