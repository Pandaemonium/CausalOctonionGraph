- id: ALG-004
  title: The Octonion Norm is Multiplicative
  status: proved
  pi_obs_profile: minimal
  pi_obs_profile_version: v1
  projection_sensitivity: unknown
  profile_contrast_run: ""
  equivalence_mode: none
  lean_file: CausalGraphTheory/Octonions.lean
  theorems:
    - oct_norm_multiplicative
  description: >
    The norm N(x) = sum_i a_i^2 satisfies N(x·y) = N(x)·N(y) for all x, y in O.
    This makes O a composition algebra (eight-squares identity over Z).
    Proved via the conjugate identity x·x̄ = N(x)·e0 and the flexible law.
  pedagogy: pedagogy/alg-004.md
