- id: ALG-001
  title: Octonion Basis Multiplication is Anti-Commutative
  status: proved
  pi_obs_profile: minimal
  pi_obs_profile_version: v1
  projection_sensitivity: unknown
  profile_contrast_run: ""
  equivalence_mode: none
  lean_file: CausalGraphTheory/Octonions.lean
  theorems:
    - oct_basis_anticomm
  description: >
    For all imaginary basis units e_i, e_j with i ≠ j, we have
    e_i · e_j = -(e_j · e_i). The sign flip is encoded by the directed
    structure of the seven Fano triples. Verified by decidable enumeration
    over all 42 ordered imaginary pairs.
