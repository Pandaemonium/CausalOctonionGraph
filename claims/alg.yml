- id: ALG-003
  title: Octonions are Non-Associative
  status: proved
  pi_obs_profile: minimal
  pi_obs_profile_version: v1
  projection_sensitivity: unknown
  profile_contrast_run: ""
  equivalence_mode: none
  lean_file: CausalGraphTheory/Octonions.lean
  theorems:
    - oct_not_associative
  description: >
    There exist basis elements e_i, e_j, e_k such that (e_i·e_j)·e_k ≠ e_i·(e_j·e_k).
    Explicit witness: (e1·e2)·e3 = -e6 ≠ -e7 = e1·(e2·e3).
    Proved by decidable computation over the Fano multiplication table.
  pedagogy: pedagogy/alg-003.md
