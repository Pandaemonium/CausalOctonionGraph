blocked_reason: |
  The physical weak-mixing mechanism is still open:
  1) weighted projector/coupling observable not fully locked, and/or
  2) explicit scale-running bridge not yet closed.
  S4 stabilizer reconciliation is closed; subgroup-to-observable mapping is still open.
  The exclusive-U(1) 1/4 candidate is promising but not sufficient by itself.
  Keep status partial until RFC-029 gates pass.


