notes: |
  S4 RECONCILIATION (Lean, 2026-02-26):
    The vacuum stabilizer of e7 is now fixed to S4 in this encoding.
    Action-level witness and histogram checks are proved in:
      - GaugeGroup.vacuumStabilizer_iso_S4
      - CausalGraph.inducedNonVacLinePerms_perm_S4
      - CausalGraph.vacuumStabilizer_order_histogram = [(1,1), (2,9), (4,6), (3,8)]
    Any prior SL(2,3)-specific WEINBERG pipeline is superseded.

  LOCKED BASELINE (Lean, 2026-02-26):
    u1Mask card = 2
    weakMask card = 3
    electroweakMask card = 4
    sin2ThetaWRaw = 2/4 = 1/2
    u1Mask subset electroweakMask
    weakMask subset electroweakMask
    card(u1Mask intersect weakMask) = 1
    sin2ThetaWZPoleTarget < sin2ThetaWRaw

  NEW STRUCTURED CANDIDATE (Lean-derived, 2026-02-26):
    Define "exclusive U(1)" support by removing the U1/Weak overlap:
      exclusiveU1Card = card(u1Mask) - card(u1Mask intersect weakMask) = 2 - 1 = 1
    Then:
      sin2ThetaWExclusiveCandidate = exclusiveU1Card / card(electroweakMask) = 1/4 = 0.25
    This candidate is directly grounded in:
      CausalGraph.u1Mask_card
      CausalGraph.electroweakMask_card
      CausalGraph.u1Mask_inter_weakMask_card
      CausalGraph.sin2ThetaWObs_exclusive_u1_eq_one_four

    Status note:
      1/4 is currently the strongest non-retrofitted structured candidate in this file.
      It remains above the Z-pole target (~0.23122), so WEINBERG-001 is still open.

  FROZEN NON-BINARY WEIGHTED CANDIDATE (Lean-derived, 2026-02-26):
    weakBoostWeight assigns:
      weight 2 to the canonical weak-pair coordinates,
      weight 1 to all other coordinates.
    Under this frozen policy:
      sin2ThetaWObsNat(policyWeakBoost) = 1/3.
    This provides a true non-binary weighting baseline for RFC-029 ablations.

  Governance:
    The baseline is intentionally locked to stop denominator drift.
    Any movement from 1/2 toward physical values must come from a
    predeclared weighted observable and/or scale bridge, not post-hoc
    projector edits.
    Target scale policy is fixed to M_Z for current comparisons.

