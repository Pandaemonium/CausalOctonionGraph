id: WEINBERG-001
title: "Weinberg angle from C x O projector observables (baseline and H2 ceiling locked, mechanism open)"
statement: |
  Canonical claim file: this record supersedes duplicate drafts of WEINBERG-001.

  In the current COG Lean formalization, the locked projector baseline is:
      sin2ThetaWRaw = maskCard(U1) / maskCard(EW) = 1/2.

  A derived candidate from the same locked masks is the exclusive-U(1) ratio:
      sin2ThetaWExclusive = (maskCard(U1) - maskCard(U1 intersect Weak)) / maskCard(EW)
                          = (2 - 1) / 4
                          = 1/4.

  This baseline is formally proved and intentionally frozen to prevent
  retrofitting. The physical Z-pole weak-mixing target (~0.23122) is NOT yet
  derived from COG and remains an open mechanism under RFC-029.

