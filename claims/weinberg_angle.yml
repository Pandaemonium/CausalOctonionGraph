title: Weinberg angle from C x O projector observables (baseline and H2 ceiling locked, mechanism open)
statement: "Canonical claim file: this record supersedes duplicate drafts of WEINBERG-001.\n\nIn the current COG Lean formalization,\
  \ the locked projector baseline is:\n    sin2ThetaWRaw = maskCard(U1) / maskCard(EW) = 1/2.\n\nA derived candidate from\
  \ the same locked masks is the exclusive-U(1) ratio:\n    sin2ThetaWExclusive = (maskCard(U1) - maskCard(U1 intersect Weak))\
  \ / maskCard(EW)\n                        = (2 - 1) / 4\n                        = 1/4.\n\nThis baseline is formally proved\
  \ and intentionally frozen to prevent\nretrofitting. The physical Z-pole weak-mixing target (~0.23122) is NOT yet\nderived\
  \ from COG and remains an open mechanism under RFC-029.\n"
