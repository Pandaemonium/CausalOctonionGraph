id: WEINBERG-001
title: "Weinberg angle from C⊗O subalgebra projection ratio"
statement: |
  The Weinberg angle theta_W satisfies:
      sin^2(theta_W) = dim_eff(U(1) sector) / dim_eff(SU(2) x U(1) sector)
  where dim_eff denotes the effective dimension of the corresponding
  subalgebra projected onto the C⊗O Witt basis.

  Specifically: in the C⊗O decomposition relevant to electroweak symmetry,
  the U(1) generator occupies exactly 1 complex dimension while the full
  SU(2)xU(1) weak-hypercharge sector occupies a total of dim_eff dimensions
  determined by the Witt basis structure.  The ratio of these dimensions
  equals sin^2(theta_W) ≈ 0.2312.
status: stub
