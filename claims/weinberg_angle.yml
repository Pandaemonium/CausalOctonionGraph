id: WEINBERG-001
title: "Weinberg angle from C x O projector observables (baseline locked, mechanism open)"
statement: |
  In the current COG Lean formalization, the locked projector baseline is:
      sin2ThetaWRaw = maskCard(U1) / maskCard(EW) = 1/2.

  A derived candidate from the same locked masks is the exclusive-U(1) ratio:
      sin2ThetaWExclusive = (maskCard(U1) - maskCard(U1 intersect Weak)) / maskCard(EW)
                          = (2 - 1) / 4
                          = 1/4.

  This baseline is formally proved and intentionally frozen to prevent
  retrofitting. The physical Z-pole weak-mixing target (~0.23122) is NOT yet
  derived from COG and remains an open mechanism under RFC-029.
status: partial
lean_file: CausalGraphTheory/WeakMixingObservable.lean
lean_theorems:
  - CausalGraph.sin2ThetaWRaw_eq_one_half
  - CausalGraph.sin2ThetaWRaw_above_zpole_target
  - CausalGraph.u1Mask_subset_electroweak
  - CausalGraph.weakMask_subset_electroweak
  - CausalGraph.u1Mask_inter_weakMask_card
  - CausalGraph.u1Projector_idempotent
  - CausalGraph.weakProjector_idempotent
  - CausalGraph.electroweakProjector_idempotent
  - CausalGraph.u1Mask_card
  - CausalGraph.weakMask_card
  - CausalGraph.electroweakMask_card
  - CausalGraph.weightedTrace_overlap_card
  - CausalGraph.sin2ThetaWObs_baseline_eq_one_half
  - CausalGraph.sin2ThetaWObs_exclusive_u1_eq_one_four
  - CausalGraph.sin2ThetaWObsNat_weakBoost_eq_one_third
python_test: calc/test_constants.py::test_weinberg_candidate
depends_on:
