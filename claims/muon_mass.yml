literature:
  - "Furey (2019): Standard Model particles from split octonions, arXiv:1910.08395, Eq. 21-22"
  - "McRae (2025): Triality and the Standard Model, arXiv:2502.14016, Eq. 7-8"
  - "Baez (2002): The Octonions, math/0105155, Section 4"
  - "Baez-Huerta (2010): Division Algebras and Supersymmetry I, arXiv:0909.0319"
  - "CODATA 2022: m_mu/m_e = 206.7682830 ± 0.0000046"

experimental_value:
  ratio: 206.7682830
  uncertainty: 0.0000046
  source: "CODATA 2022"

state_vectors:
  electron_sector: "s·S* where s = ½(1+ie₇) from LEFT, S* = ½(1-ie₇) from RIGHT"
  muon_sector: "s*·S* where s* = ½(1-ie₇) from LEFT, S* = ½(1-ie₇) from RIGHT"
  electron_state: |
    ψ_e = e₁⁻ = s·S* · (i·e₁ - e₃ + e₁₂₆ + e₁₄₅) · s*·S*
    (Furey 2019, Eq. 21 — first charged lepton)
  muon_state: |
    ψ_μ = e₂⁻ = s·S* · (-i·e₂ + e₆ + e₁₂₃ - i·e₁₃₆) · s*·S*
    (Furey 2019, Eq. 21 — second charged lepton)
  note: |
    Triple products: e₁₂₃ = e₁·e₂·e₃, e₁₂₆ = e₁·e₂·e₆, etc.
    All computed via the Furey Fano convention in rfc/CONVENTIONS.md.

