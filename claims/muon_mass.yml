falsified_sub_hypothesis:
  id: COG-QC-01
  statement: m_mu/m_e = 1 + N_tau where N_tau is the Boolean circuit depth of the triality map
  status: falsified
  date: '2026-02-22'
  evidence: "Computed count_circuit_depth_greedy(H) = 14 for McRae (2025) eq. (8),\nthe exact 4x4 Euclidean triality quartet\
    \ matrix.  Verified H^3=I, H^T H=I.\nCSE structure: 4 shift ticks + 2 Walsh-Hadamard intermediates + 8 summation ticks.\n\
    Key: 14 = dim(G_2), the octonion automorphism group and triality stabilizer.\nPrediction 1+14=15 and 1+7*14=99 \xE2\u20AC\
    \u201D neither matches 206.768 at any natural scale.\nThe O(N log N) geometric bound on a 4x4 Hadamard butterfly rules\
    \ out naive scaling\nto 206 without an arbitrary multiplier.\n"
  significance: 'N_tau = 14 = dim(G_2) is a proved non-trivial result: the hardware cost of one

    triality quartet evaluation equals the dimension of the symmetry group it stabilizes.

    '
schur_lemma_block:
  date: '2026-02-22'
  statement: "The 8\xC3\u20148 SO(8) outer triality intertwiner T satisfying\n  T \xC2\xB7 V_ij \xC2\xB7 T^{-1} = L_{H(ij)}\n\
    for all 28 generator pairs does NOT exist as a single 8\xC3\u20148 matrix.\nReason: Schur's Lemma \xE2\u20AC\u201D V-rep\
    \ and S+-rep have different eigenvalue spectra\n(\xC2\xB1i vs \xC2\xB1i/2), so there is no intertwiner between them.\n"
  consequence: "The COG mechanism does NOT translate the 8D fermion state vector.\nInstead, the OPERATOR (photon, e\xE2\u201A\
    \u2021) is translated via the 4\xC3\u20144 McRae H matrix,\nincurring N_\xCF\u201E = 14 ticks per S+ vertex (the triality\
    \ emulation overhead).\nThe state-space orbit is determined by the DAG graph topology, not by the\nrepresentation-theoretic\
    \ intertwiner.\n"
