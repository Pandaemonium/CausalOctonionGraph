id: LEPTON-001
title: Muon-to-electron mass ratio from COG orbit length
statement: "The muon-to-electron mass ratio m_\xCE\xBC/m_e \xE2\u2030\u02C6 206.768 equals, in the\nCOG framework, the ratio\
  \ of orbit lengths (tick counts) of the muon\nand electron motifs under the COG exchange rule:\n\n    m_\xCE\xBC / m_e =\
  \ C_\xCE\xBC / C_e\n\nwhere:\n  C_e = orbit length of the electron motif (generation-1 state \xCF\u02C6_e\n        in the\
  \ s\xC2\xB7S* sector of C\xE2\u0160\u2014O, cycling through the L1\n        associative quaternionic subalgebra {e\xE2\u201A\
  , e\xE2\u201A\u201A, e\xE2\u201A\u0192}).\n\n  C_\xCE\xBC = orbit length of the muon motif (generation-2 state \xCF\u02C6\
  _\xCE\xBC\n        in the s*\xC2\xB7S* sector of C\xE2\u0160\u2014O, cycling through a non-associative\n        Fano path\
  \ and returning to the starting state).\n\nThe key mechanism: \xCF\u02C6_e absorbs photons (e\xE2\u201A\u2021 right-mult)\
  \ and returns to\nits initial signed state in C_e = 4 symmetric exchange cycles (exact\nsigned return). Earlier drafts stated\
  \ C_e = 3; the 2026-02-23 calibration\n(qed_calibration.py, 50 tests) gives C_e = 4 from the signed kick orbit.\n\xCF\u02C6\
  _\xCE\xBC requires a non-associative Fano path \xE2\u20AC\u201D its orbit is longer, and the\nratio C_\xCE\xBC/C_e should\
  \ match 206.768.\n"
