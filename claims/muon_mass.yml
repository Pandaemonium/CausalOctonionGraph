falsified_sub_hypothesis:
  id: COG-QC-01
  statement: "m_mu/m_e = 1 + N_tau where N_tau is the Boolean circuit depth of the triality map"
  status: falsified
  date: "2026-02-22"
  evidence: |
    Computed count_circuit_depth_greedy(H) = 14 for McRae (2025) eq. (8),
    the exact 4x4 Euclidean triality quartet matrix.  Verified H^3=I, H^T H=I.
    CSE structure: 4 shift ticks + 2 Walsh-Hadamard intermediates + 8 summation ticks.
    Key: 14 = dim(G_2), the octonion automorphism group and triality stabilizer.
    Prediction 1+14=15 and 1+7*14=99 — neither matches 206.768 at any natural scale.
    The O(N log N) geometric bound on a 4x4 Hadamard butterfly rules out naive scaling
    to 206 without an arbitrary multiplier.
  significance: |
    N_tau = 14 = dim(G_2) is a proved non-trivial result: the hardware cost of one
    triality quartet evaluation equals the dimension of the symmetry group it stabilizes.

schur_lemma_block:
  date: "2026-02-22"
  statement: |
    The 8×8 SO(8) outer triality intertwiner T satisfying
      T · V_ij · T^{-1} = L_{H(ij)}
    for all 28 generator pairs does NOT exist as a single 8×8 matrix.
    Reason: Schur's Lemma — V-rep and S+-rep have different eigenvalue spectra
    (±i vs ±i/2), so there is no intertwiner between them.
  consequence: |
    The COG mechanism does NOT translate the 8D fermion state vector.
    Instead, the OPERATOR (photon, e₇) is translated via the 4×4 McRae H matrix,
    incurring N_τ = 14 ticks per S+ vertex (the triality emulation overhead).
    The state-space orbit is determined by the DAG graph topology, not by the
    representation-theoretic intertwiner.

