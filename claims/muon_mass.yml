literature_gaps_found_2026_02_23:
  search_agent: afd2f71
  source: "arXiv search: Furey 1603.04078, 1611.09182, 1910.08395; McRae 2502.14016; Dixon hep-th/9410202"
  findings:
    - id: gap_1_electron_state
      severity: important
      finding: |
        Furey's electron is NOT simply e1 or the L1 quaternionic subalgebra.
        In Furey (1603.04078 eq. 20, 1611.09182 ch. 6), the electron is
        α₁α₂α₃ω†ω — the fully lowered state in the S^d minimal left ideal,
        a composite of all three Witt pairs simultaneously. The "L1 = electron"
        label is a COG-local simplification.
      cog_position: |
        The COG qed_calibration.py models a SINGLE BASIS ELEMENT e1 kicked by
        the e7 operator, obtaining C_e = 4. This is a valid reduced model
        (tracking one component of the full state) but is not equivalent to
        simulating the full Furey electron state α₁α₂α₃ω†ω. The relationship
        between C_e(e1 component) and C_e(full Furey state) is OPEN.
      resolution_2026_02_23: |
        CLOSED by calc/furey_electron_orbit.py (26 tests, all passing).

        UNIVERSAL C_e THEOREM (proved algebraically, verified numerically):
        By the left-alternative law of C(x)O:
            e7 * (e7 * x) = (e7 * e7) * x = -x   for ALL non-zero x.
        Therefore L_{e7}^4 = id and the orbit period of ANY non-zero state
        is exactly 4. Period 1 and 2 are impossible for non-zero states
        (they would require -x = x, hence x = 0).

        COMPUTED RESULT:
        The full Furey electron state (CONVENTIONS.md §6):
            psi_e = alpha1_dag * (alpha2_dag * (alpha3_dag * omega)) = -i * omega_dag
        Algebraic derivation confirms:
            alpha3_dag * omega = alpha3_dag        (omega is right identity on S)
            alpha2_dag * alpha3_dag = 0.5*(e1 - i*e6)
            alpha1_dag * 0.5*(e1-i*e6) = -i * omega_dag
        Orbit: {-i*omega_dag, omega_dag, i*omega_dag, -omega_dag}, period 4.

        C_e(e1 component) = C_e(full Furey state) = 4. The simplification
        is not an artifact. The gap is RESOLVED.

        CONSEQUENCE: Since C_e = C_mu = 4 universally, the mass ratio
        m_mu/m_e = 206.768 CANNOT arise from state-orbit period under L_{e7}
        alone. The mechanism must come from triality overhead (N_tau=14 per
        S+ vertex) or DAG topology.
    - id: gap_2_e7_photon
      severity: moderate
      finding: |
        No Furey paper explicitly identifies e7 right-multiplication as the
        photon absorption operator. Furey identifies e7 as the vacuum axis
        (held fixed by SU(3)_c) and U(1)_EM with the number operator N/3.
        The "photon = e7 right-mult kick" is COG-original with no arXiv precedent.
    - id: gap_3_dixon_orbits
      severity: important
      finding: |
        Dixon (1994 hep-th/9410202) X-product orbits are algebraic orbits under
        a PERMUTED multiplication table, not physical orbits under repeated
        application of a fixed operator. Full text not yet read; abstract makes
        no lepton mass ratio claims. The connection of Dixon periods to ~206 is
        unsupported by evidence reviewed.
    - id: gap_4_mcrae_three_generations
      severity: moderate
      finding: |
        McRae (2502.14016) Section 5 explicitly states: "One obstruction to
        making this work in the 'obvious' way is finding outer automorphisms
        which act at the level of the representation, and not merely on the
        algebra." McRae identifies this as an OPEN PROBLEM, not a solution.
        The COG use of the 4×4 H matrix for operator translation (N_τ = 14)
        remains valid; the generation-identification use is challenged.

