state_vectors:
  electron_sector: "s·S* where s = ½(1+ie₇) from LEFT, S* = ½(1-ie₇) from RIGHT"
  muon_sector: "s*·S* where s* = ½(1-ie₇) from LEFT, S* = ½(1-ie₇) from RIGHT"
  electron_state: |
    ψ_e = e₁⁻ = s·S* · (i·e₁ - e₃ + e₁₂₆ + e₁₄₅) · s*·S*
    (Furey 2019, Eq. 21 — first charged lepton)
  muon_state: |
    ψ_μ = e₂⁻ = s·S* · (-i·e₂ + e₆ + e₁₂₃ - i·e₁₃₆) · s*·S*
    (Furey 2019, Eq. 21 — second charged lepton)
  note: |
    Triple products: e₁₂₃ = e₁·e₂·e₃, e₁₂₆ = e₁·e₂·e₆, etc.
    All computed via the Furey Fano convention in rfc/CONVENTIONS.md.

