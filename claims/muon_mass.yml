literature_gaps_found_2026_02_23:
  search_agent: afd2f71
  source: 'arXiv search: Furey 1603.04078, 1611.09182, 1910.08395; McRae 2502.14016; Dixon hep-th/9410202'
  findings:
  - id: gap_1_electron_state
    severity: important
    finding: "Furey's electron is NOT simply e1 or the L1 quaternionic subalgebra.\nIn Furey (1603.04078 eq. 20, 1611.09182\
      \ ch. 6), the electron is\n\xCE\xB1\xE2\u201A\xCE\xB1\xE2\u201A\u201A\xCE\xB1\xE2\u201A\u0192\xCF\u2030\xE2\u20AC\_\xCF\
      \u2030 \xE2\u20AC\u201D the fully lowered state in the S^d minimal left ideal,\na composite of all three Witt pairs\
      \ simultaneously. The \"L1 = electron\"\nlabel is a COG-local simplification.\n"
    cog_position: "The COG qed_calibration.py models a SINGLE BASIS ELEMENT e1 kicked by\nthe e7 operator, obtaining C_e =\
      \ 4. This is a valid reduced model\n(tracking one component of the full state) but is not equivalent to\nsimulating\
      \ the full Furey electron state \xCE\xB1\xE2\u201A\xCE\xB1\xE2\u201A\u201A\xCE\xB1\xE2\u201A\u0192\xCF\u2030\xE2\u20AC\
      \_\xCF\u2030. The relationship\nbetween C_e(e1 component) and C_e(full Furey state) is OPEN.\n"
    resolution_2026_02_23: "CLOSED by calc/furey_electron_orbit.py (26 tests, all passing).\n\nUNIVERSAL C_e THEOREM (proved\
      \ algebraically, verified numerically):\nBy the left-alternative law of C(x)O:\n    e7 * (e7 * x) = (e7 * e7) * x =\
      \ -x   for ALL non-zero x.\nTherefore L_{e7}^4 = id and the orbit period of ANY non-zero state\nis exactly 4. Period\
      \ 1 and 2 are impossible for non-zero states\n(they would require -x = x, hence x = 0).\n\nCOMPUTED RESULT:\nThe full\
      \ Furey electron state (CONVENTIONS.md \xC2\xA76):\n    psi_e = alpha1_dag * (alpha2_dag * (alpha3_dag * omega)) = -i\
      \ * omega_dag\nAlgebraic derivation confirms:\n    alpha3_dag * omega = alpha3_dag        (omega is right identity on\
      \ S)\n    alpha2_dag * alpha3_dag = 0.5*(e1 - i*e6)\n    alpha1_dag * 0.5*(e1-i*e6) = -i * omega_dag\nOrbit: {-i*omega_dag,\
      \ omega_dag, i*omega_dag, -omega_dag}, period 4.\n\nC_e(e1 component) = C_e(full Furey state) = 4. The simplification\n\
      is not an artifact. The gap is RESOLVED.\n\nCONSEQUENCE: Since C_e = C_mu = 4 universally, the mass ratio\nm_mu/m_e\
      \ = 206.768 CANNOT arise from state-orbit period under L_{e7}\nalone. The mechanism must come from triality overhead\
      \ (N_tau=14 per\nS+ vertex) or DAG topology.\n"
  - id: gap_2_e7_photon
    severity: moderate
    finding: 'No Furey paper explicitly identifies e7 right-multiplication as the

      photon absorption operator. Furey identifies e7 as the vacuum axis

      (held fixed by SU(3)_c) and U(1)_EM with the number operator N/3.

      The "photon = e7 right-mult kick" is COG-original with no arXiv precedent.

      '
  - id: gap_3_dixon_orbits
    severity: important
    finding: 'Dixon (1994 hep-th/9410202) X-product orbits are algebraic orbits under

      a PERMUTED multiplication table, not physical orbits under repeated

      application of a fixed operator. Full text not yet read; abstract makes

      no lepton mass ratio claims. The connection of Dixon periods to ~206 is

      unsupported by evidence reviewed.

      '
  - id: gap_4_mcrae_three_generations
    severity: moderate
    finding: "McRae (2502.14016) Section 5 explicitly states: \"One obstruction to\nmaking this work in the 'obvious' way\
      \ is finding outer automorphisms\nwhich act at the level of the representation, and not merely on the\nalgebra.\" McRae\
      \ identifies this as an OPEN PROBLEM, not a solution.\nThe COG use of the 4\xC3\u20144 H matrix for operator translation\
      \ (N_\xCF\u201E = 14)\nremains valid; the generation-identification use is challenged.\n"
