id: LEPTON-001
title: "Muon-to-electron mass ratio from COG orbit length"
statement: |
  The muon-to-electron mass ratio m_μ/m_e ≈ 206.768 equals, in the
  COG framework, the ratio of orbit lengths (tick counts) of the muon
  and electron motifs under the COG exchange rule:

      m_μ / m_e = C_μ / C_e

  where:
    C_e = orbit length of the electron motif (generation-1 state ψ_e
          in the s·S* sector of C⊗O, cycling through the L1
          associative quaternionic subalgebra {e₁, e₂, e₃}).

    C_μ = orbit length of the muon motif (generation-2 state ψ_μ
          in the s*·S* sector of C⊗O, cycling through a non-associative
          Fano path and returning to the starting state).

  The key mechanism: ψ_e lives in the associative L1 subalgebra — its
  orbit is short (C_e = 3). ψ_μ requires a non-associative Fano path
  — its orbit is longer, and the ratio C_μ/C_e should match 206.768.

status: open  # orbit-length mechanism; COG-QC-01 sub-hypothesis falsified (see notes)
