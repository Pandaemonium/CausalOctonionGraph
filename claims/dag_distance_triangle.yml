notes: "Reformulated using Bool-valued n-step reachability predicate (reachableIn)\ninstead of fuel-based BFS. All lemmas\
  \ proved with no sorry.\n\nreachableIn G s t n = true iff there is a directed path of exactly n edges\nfrom s to t. dist\
  \ G s t = (List.range (t-s+1)).find? (reachableIn G s t).\n\nKey lemmas:\n  reachableIn_bound: path existence implies s<=t\
  \ and depth bound d<=t-s.\n    Uses G.acyclic (edge source < target) to bound path length.\n  reachableIn_concat: n-hop\
  \ path a->b and m-hop path b->c compose to\n    (n+m)-hop path a->c. Proved via auxiliary lemma (reachableIn_concat_aux)\n\
  \    to ensure the IH is universally quantified over the start node.\n  find?_range_le: List.find? on List.range returns\
  \ the minimum index.\n    Proved by contradiction: if d'> d and p d = true, decompose\n    List.range n = List.range d'\
  \ ++ rest, show prefix has no match\n    via find?_append + List.find?_eq_none, derive p d = false.\n  dist_implies_reachable:\
  \ dist G s t = some d -> reachableIn G s t d.\n    Uses List.find?_some + by_cases on s>t.\n  reachable_implies_dist_le:\
  \ reachable in d steps -> exists d'<=d with\n    dist G s t = some d'. Uses find?_range_le for the minimality.\n  dist_triangle:\
  \ combines the above to prove dac <= dab + dbc.\n"
