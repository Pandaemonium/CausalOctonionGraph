id: DIST-001
title: DAG distance satisfies triangle inequality
statement: 'For any nodes a, b, c in a causal graph G, if directed paths exist

  a->b, b->c, and a->c, then dist(a,c) <= dist(a,b) + dist(b,c).

  '
status: proved
