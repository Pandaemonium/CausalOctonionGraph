id: CFS-002
title: "Discrete minimizers and unique tick choice"
statement: |
  Given a fixed initial microstate with predeclared parenthesization
  (RFC-002), each tick chooses a unique next local update by deterministic
  minimization over a finite candidate set. No exogenous information is
  introduced during evolution.
