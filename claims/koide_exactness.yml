id: KOIDE-001
title: "Koide Formula from Integer Constraints"
statement: |
  The Koide ratio Q = (sum m_i) / (sum sqrt(m_i))^2 equals exactly 2/3
  because the allowed tick frequencies (m_i) are constrained by the
  diophantine equations governing the Fano plane's cycle structure.
