id: KOIDE-001
title: "Koide Formula from Integer Constraints"
statement: |
  The Koide ratio Q = (sum m_i) / (sum sqrt(m_i))^2 equals exactly 2/3
  because the allowed tick frequencies (m_i) are constrained by the
  diophantine equations governing the Fano plane's cycle structure.
status: candidate
lean_file: CausalGraphTheory/Koide.lean
lean_theorems:
  - koide_ratio_is_two_thirds
python_test: calc/koide.py
depends_on:
  - MASS-001
literature:
  - "Koide (1982): A new formula for the masses of charged leptons"
  - "Brannen (2006): Discrete Fourier Transform and the Koide Formula (non-arXiv preprint)"
  - "Koide (2005, hep-ph/0506247): Derivation from S3-symmetric Higgs VEV — requires continuous fields, FORBIDDEN in COG"
notes: |
  This is the 'Hail Mary' claim. If the COG update rules naturally force the
  algebraic relation f₀²+f₁²+f₂² = 4(f₀f₁+f₁f₂+f₂f₀), the theory is
  strongly supported.  If not, it is a falsification target.

  BRANNEN PARAMETRIZATION (key insight):
    Write f_k = A + B·cos(φ + 2πk/3)  (k = 0, 1, 2).
    Z3 phase spacing forces Q = 1/3 + B²/(6A²).
    Q = 2/3  requires  B = A√2  (a SEPARATE constraint beyond Z3).

  WHAT SL(2,3) / Z3 ACTUALLY FORCES:
    The 24-element vacuum stabilizer SL(2,3) contains the Z3 rotation
    (equal phase spacing 2π/3 between the three Witt color planes).
    This forces Σf_k = 3A (the cosine terms cancel), which rules out
    Q = 1 but does NOT fix the ratio B/A.

  GEOMETRIC DERIVATION OF B/A = √2 (unblocking candidate, 2026-02-22):
    The constraint B/A = √2 is PURE GEOMETRY of the 3-generation mass space.
    It does not require a new group-theoretic mechanism.

    Setup: Write the 3 square-root masses as a vector v = (√m₀, √m₁, √m₂).
    The "democratic axis" in this 3D space is d = (1,1,1)/√3.
    The Koide ratio satisfies Q = 1 / (3 cos²θ) where θ is the angle
    between v and d.  Q = 2/3 requires cos²θ = 1/2, i.e. θ = 45°.

    Orthonormal basis of the 2D plane perpendicular to d:
      u₁ = (1, -1, 0) / √2
      u₂ = (1,  1,-2) / √6

    The normalization factor 1/√2 on u₁ IS the √2 in B/A = √2.
    When the v-component along u₁ has amplitude B, the democratic component
    has amplitude A·√3 and the off-democratic has amplitude B·√(3/2).
    Equal amplitudes (θ = 45°) require A·√3 = B·√(3/2), giving B/A = √2.

    CIRCULANT MATRIX ORIGIN (Brannen/J₃(𝕆) connection):
    The Brannen parametrization √mₙ = A + B·cos(θ + 2πn/3) is exactly the
    eigenvalue formula for a 3×3 circulant Hermitian matrix C ∈ J₃(ℂ).
    The three generation masses are the eigenvalues of such a matrix.
    The "democratic limit" (B → 0) is the degenerate matrix A·I₃.
    The B/A = √2 constraint is the condition that the matrix norm in the
    off-democratic sector equals the democratic sector norm — the matrix
    version of the θ = 45° projection condition.

    Connection to J₃(𝕆): Carl Brannen's circulant Hermitian matrices live in
    J₃(ℂ) ⊂ J₃(𝕆) (Albert algebra of 3×3 octonionic Hermitian matrices).
    The three COG lepton generation states correspond to the 3 diagonal entries;
    the COG exchange rule (with Triality overhead) generates the off-diagonal
    circulant structure.  The constraint B/A = √2 then follows from the equal-
    weight Triality mixing across the three Witt color planes.

  ALGEBRAIC REFORMULATION (provable in Lean now):
    Q = 2/3  ⟺  f₀²+f₁²+f₂² = 4(f₀f₁+f₁f₂+f₂f₀).
    This identity holds over any commutative ring and can be proved
    by `ring` in Lean 4 without importing ℝ.  The identity itself
    is NOT the blocked part — the blocked part is showing the COG
    update rules force exactly this identity.
candidate_mechanism: |
  B/A = √2 is the GEOMETRIC NORMALIZATION of the 2D complement to the
  democratic axis in 3-generation mass space.  The key insight (Gemini,
  2026-02-22): the Brannen parametrization is the eigenvalue formula of a
  3×3 circulant Hermitian matrix in J₃(ℂ) ⊂ J₃(𝕆).  The condition Q = 2/3
  (θ = 45° from democratic axis) follows from equal democratic and off-
  democratic amplitudes, which is imposed by the equal-weight Triality mixing
  of COG's three lepton generation states across the three Witt color planes.

  REMAINING OPEN QUESTION:
    The GEOMETRIC picture is clear (B/A = √2 = normalization of u₁ = (1,-1,0)/√2).
    What remains is to show that COG's exchange rule SPECIFICALLY produces
    the circulant Hermitian structure — i.e., that the Triality rotation
    overhead for each generation is exactly equal in magnitude (but with
    120° phase spacing), which is the COG statement that generates the
    circulant matrix.  This is the task of calc/lepton_generations.py.

previously_blocked_reason: |
  Z3 symmetry (supplied by SL(2,3) ⊂ GL(3,2)) forces equal phase spacing
  between the three Witt color-plane tick rates, but does NOT force the ratio
  B/A = √2 required for Q = 2/3 in the Brannen parametrization.  The previous
  claim that "SL(2,3) forces cos²(θ) = 1/2 yielding Q = 2/3" was incorrect
  and has been retracted from calc/koide.py.  Unblocked 2026-02-22 by the
  geometric realization that √2 is the normalization of the orthogonal
  complement to the democratic axis, derivable from J₃(𝕆) circulant structure.
