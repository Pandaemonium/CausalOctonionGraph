proved_results:
  - id: brannen_b_squared
    date: "2026-02-22"
    statement: |
      Given the Brannen ansatz f_k = A*(1+B*c_k) with Z3 trig sums
      c0+c1+c2=0 and c0*c1+c1*c2+c2*c0=-3/4, and the Koide condition
      3*(f0^2+f1^2+f2^2) = 2*(f0+f1+f2)^2, we have B^2 = 2.
      Proved purely over Q: linear_combination (4 steps) + linarith.
      Axioms: propext, Classical.choice, Quot.sound only (no sorry).
    significance: |
      Closes the B/A = sqrt(2) blocker algebraically. Given any valid
      Brannen parametrization (Z3 ansatz), Koide Q=2/3 forces B^2=2
      as a pure ring identity. The remaining open question is whether
      COG update rules produce the Z3 ansatz structure.

  - id: positivity_band
    date: "2026-02-22"
    statement: |
      For B = A*sqrt(2), the three Brannen amplitudes f_k = A + B*cos(phi + 2*pi*k/3)
      are ALL positive iff min_k cos(phi + 2*pi*k/3) > -1/sqrt(2) ~= -0.7071.

      The physical charged-lepton phase phi ~= 2/9 rad gives:
          min cosine ~= -0.6795 > -0.7071  (margin ~= 0.028)

      Therefore the empirical Q = 2/3 for (e, mu, tau) uses ALL POSITIVE square
      roots: Q = sum(sqrt(m_k)^2) / (sum(sqrt(m_k)))^2 ~= 0.666661 ~= 2/3.
      (Error ~6e-6 from experimental mass uncertainty in m_tau.)

      About 75% of phi in [0, 2*pi] falls outside the band (one f_k negative);
      the algebraic identity Q = 2/3 holds in both regimes as a ring identity.
    significance: |
      Corrects a hallucination (2026-02-22) that claimed B = A*sqrt(2) universally
      forces one f_k < 0 ("electron negative amplitude"). That claim confused the
      charged-lepton formula with a neutrino Koide extension. The physical phase
      sits in a narrow allowed band 0.028 units above the negativity threshold.
      brannen_b_squared remains valid in both regimes.
    python_test: calc/test_koide_sl23.py::TestPositivityBand

