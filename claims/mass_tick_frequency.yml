id: MASS-001
title: "Mass as tick-count frequency (computational drag)"
statement: |
  In the Causal Octonion Graph, the inertial mass of a node n is
  proportional to its accumulated tick count: mass(n) proportional to tickCount(n).
  Formally:

    tickMass G n = 0            when n is absent from G
    tickMass G n = nd.tickCount when G.findNode n = some nd

  The mass fraction massFrac G n = (tickMass G n, graphDepth G) is a
  Nat x Nat representation of the ratio tickCount/graphDepth.

  The Koide relation for charged leptons (Q approx 2/3) constrains the
  tick-rate vector (t_e, t_mu, t_tau) to satisfy:

    sum(t) / (sum(sqrt(t)))^2 = 2/3   (Koide equation in tick-frequency form)

  with the angle between the tick vector and the democratic direction
  theta = 45 degrees (cos^2(theta) = 1/2, so Q = 1/(3 cos^(-2)(theta)) = 2/3).
status: partial
lean_file: CausalGraphTheory/Mass.lean
lean_theorems:
  - CausalGraph.tickMass_zero_of_tickCount_zero
  - CausalGraph.tickMass_zero_of_not_found
  - CausalGraph.tickMass_mono
  - CausalGraph.massFrac_le_iff_tickMass_le
lean_theorems_sorry:
  - CausalGraph.step_new_node_tickCount
  - CausalGraph.step_tickMass_nondecreasing
python_check: calc/mass_ratios.py
python_test: calc/test_koide.py
depends_on:
