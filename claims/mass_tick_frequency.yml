notes: |
  Core theorems proved (no sorry):
    tickMass_zero_of_tickCount_zero: node with tickCount=0 has mass 0.
    tickMass_zero_of_not_found: absent node has mass 0.
    tickMass_mono: if node exists its mass equals its tickCount.
    massFrac_le_iff_tickMass_le: fraction comparison reduces to tickCount
      comparison (requires graphDepth > 0 as hypothesis hd).

  Phase 6 (proved, no sorry):
    step_new_node_tickCount: step creates a new node with incremented tick.
      Proof: step_nodes_of_some unfolds the named-match via split+simp_all;
      List.mem_append closes membership.
    step_tickMass_nondecreasing: tickMass is non-decreasing across steps.
      Proof: findNode_step_of_lt (List.find?_append + Option.or_none) shows
      appending a fresh node preserves old lookups; omega closes k <= k+1.

  Koide angle derivation (calc/koide.py, 21/21 tests passing):
    Q = sum(m) / (sum(sqrt(m)))^2 approx 0.6666 for charged leptons.
    theta = arccos(sqrt(1/(3Q))) = arccos(sqrt(1/2)) = 45.0 degrees exactly.
    The tick-rate vector lives on a great circle 45 degrees from the
    democratic axis.
mass_observable_policy: |
  PRIMARY OBSERVABLE (for all mass-ratio claims):
    Gate-density rate = (tick-type gate count) / (total causal depth)
    in the long-run deterministic-path limit (superdeterministic framing:
    the simulation follows the single pre-encoded causal branch).
    Formally: lim_{t -> inf} tickCount(n, t) / graphDepth(G, t)
    This is compatible with RFC-002 superdeterminism: no branch choice is
    made at runtime; we measure the rate along the pre-encoded path.

  SECONDARY OBSERVABLES (diagnostic use only â€” not primary evidence):
    - First-recurrence time: the step at which a motif returns to its
      initial state for the first time. Useful for sanity-checking motif
      construction but NOT the physical mass ratio. Cited as "diagnostic".
    - Cycle count ratio: C_p / C_e at first recurrence. Historical v1
      results (C_p/C_e = 8/3 or 11/3) are labeled FALSIFICATION_DATUM
      in proton_electron_ratio.yml because they used first-recurrence,
      not the thermodynamic gate-density limit.

  GATE TYPE CLASSIFICATION:
    P-type gates: propagation gates (associative subalgebra, cost 1 each).
    S-type gates: strong/non-associative gates (Alternativity Trigger, cost 2 each).
    The mass ratio m_p/m_e emerges from the long-run S-type gate density
    of the proton motif relative to the P-type gate density of the electron.

  NOTE ON SUPERDETERMINISTIC COMPATIBILITY:
    The long-run rate is the natural observable in a superdeterministic
    universe. "Long-run" here means following the single causal path encoded
    in the initial evaluation plan (RFC-002 Â§3.2), not averaging over branches.
    The simulation explores branches only as a SEARCH technique to identify
    which plan encodes the observed physics.

