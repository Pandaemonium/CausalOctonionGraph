id: MASS-001
title: Mass as tick-count frequency (computational drag)
statement: "In the Causal Octonion Graph, the inertial mass of a node n is\nproportional to its accumulated tick count: mass(n)\
  \ proportional to tickCount(n).\nFormally:\n\n  tickMass G n = 0            when n is absent from G\n  tickMass G n = nd.tickCount\
  \ when G.findNode n = some nd\n\nThe mass fraction massFrac G n = (tickMass G n, graphDepth G) is a\nNat x Nat representation\
  \ of the ratio tickCount/graphDepth.\n\nThe Koide relation for charged leptons (Q approx 2/3) constrains the\ntick-rate\
  \ vector (t_e, t_mu, t_tau) to satisfy:\n\n  sum(t) / (sum(sqrt(t)))^2 = 2/3   (Koide equation in tick-frequency form)\n\
  \nwith the angle between the tick vector and the democratic direction\ntheta = 45 degrees (cos^2(theta) = 1/2, so Q = 1/(3\
  \ cos^(-2)(theta)) = 2/3).\n"
