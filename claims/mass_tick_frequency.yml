notes: "Core theorems proved (no sorry):\n  tickMass_zero_of_tickCount_zero: node with tickCount=0 has mass 0.\n  tickMass_zero_of_not_found:\
  \ absent node has mass 0.\n  tickMass_mono: if node exists its mass equals its tickCount.\n  massFrac_le_iff_tickMass_le:\
  \ fraction comparison reduces to tickCount\n    comparison (requires graphDepth > 0 as hypothesis hd).\n\nPhase 6 (proved,\
  \ no sorry):\n  step_new_node_tickCount: step creates a new node with incremented tick.\n    Proof: step_nodes_of_some unfolds\
  \ the named-match via split+simp_all;\n    List.mem_append closes membership.\n  step_tickMass_nondecreasing: tickMass is\
  \ non-decreasing across steps.\n    Proof: findNode_step_of_lt (List.find?_append + Option.or_none) shows\n    appending\
  \ a fresh node preserves old lookups; omega closes k <= k+1.\n\nKoide angle derivation (calc/koide.py, 21/21 tests passing):\n\
  \  Q = sum(m) / (sum(sqrt(m)))^2 approx 0.6666 for charged leptons.\n  theta = arccos(sqrt(1/(3Q))) = arccos(sqrt(1/2))\
  \ = 45.0 degrees exactly.\n  The tick-rate vector lives on a great circle 45 degrees from the\n  democratic axis.\n"
mass_observable_policy: "PRIMARY OBSERVABLE (for all mass-ratio claims):\n  Gate-density rate = (tick-type gate count) / (total\
  \ causal depth)\n  in the long-run deterministic-path limit (superdeterministic framing:\n  the simulation follows the single\
  \ pre-encoded causal branch).\n  Formally: lim_{t -> inf} tickCount(n, t) / graphDepth(G, t)\n  This is compatible with\
  \ RFC-002 superdeterminism: no branch choice is\n  made at runtime; we measure the rate along the pre-encoded path.\n\n\
  SECONDARY OBSERVABLES (diagnostic use only \xE2\u20AC\u201D not primary evidence):\n  - First-recurrence time: the step\
  \ at which a motif returns to its\n    initial state for the first time. Useful for sanity-checking motif\n    construction\
  \ but NOT the physical mass ratio. Cited as \"diagnostic\".\n  - Cycle count ratio: C_p / C_e at first recurrence. Historical\
  \ v1\n    results (C_p/C_e = 8/3 or 11/3) are labeled FALSIFICATION_DATUM\n    in proton_electron_ratio.yml because they\
  \ used first-recurrence,\n    not the thermodynamic gate-density limit.\n\nGATE TYPE CLASSIFICATION:\n  P-type gates: propagation\
  \ gates (associative subalgebra, cost 1 each).\n  S-type gates: strong/non-associative gates (Alternativity Trigger, cost\
  \ 2 each).\n  The mass ratio m_p/m_e emerges from the long-run S-type gate density\n  of the proton motif relative to the\
  \ P-type gate density of the electron.\n\nNOTE ON SUPERDETERMINISTIC COMPATIBILITY:\n  The long-run rate is the natural\
  \ observable in a superdeterministic\n  universe. \"Long-run\" here means following the single causal path encoded\n  in\
  \ the initial evaluation plan (RFC-002 \xC2\xA73.2), not averaging over branches.\n  The simulation explores branches only\
  \ as a SEARCH technique to identify\n  which plan encodes the observed physics.\n"
