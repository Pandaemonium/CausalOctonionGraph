id: ALG-001
title: "Octonions are alternative but non-associative"
statement: |
  The octonion algebra O is alternative: x(xy) = (xx)y and (yx)x = y(xx).
  It is not associative: there exist x, y, z such that (xy)z != x(yz).
status: proved
