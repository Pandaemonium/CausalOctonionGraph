id: WEINBERG-UV-001
title: "UV weak-mixing structural observable (exclusive-U1) is 1/4"
statement: |
  In the locked COG projector formalization, the UV structural weak-mixing
  observable defined by exclusive-U(1) support is:

      sin2ThetaWExclusive = (card(U1) - card(U1 intersect Weak)) / card(EW) = 1/4

  and this value is invariant under all vacuum-stabilizer (S4) transported
  weak-pair permutations used by the current encoding.

