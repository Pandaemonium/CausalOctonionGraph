id: RACE-001
title: Discrete Lorentz Covariance (Confluence / No Race Condition)
statement: "For any two causal graphs G1 and G2 whose edge lists are permutations of each\nother, the Tick/Batch classification\
  \ of every node is identical:\n  G1.edges.Perm G2.edges -> forall n, G1.classify n = G2.classify n\n\nEquivalently:\n(a)\
  \ Batch nodes: incoming operators lying on a single Fano line generate an\n    associative (quaternionic) subalgebra, so\
  \ any evaluation order produces\n    the same result. No race condition exists.\n(b) Tick nodes: non-associativity of the\
  \ octonionic operators forces a unique\n    sequential evaluation order. Different representational orderings of the\n \
  \   edge list still agree on the Tick/Batch classification.\n\nThis is the COG formalization of Lorentz covariance: causal\
  \ event\nclassification is a physical invariant, not an artefact of the observer's\nrepresentational ordering.\n"
