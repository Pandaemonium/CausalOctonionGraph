id: RACE-001
title: "Discrete Lorentz Covariance (Confluence / No Race Condition)"
statement: |
  For any two causal graphs G1 and G2 whose edge lists are permutations of each
  other, the Tick/Batch classification of every node is identical:
    G1.edges.Perm G2.edges -> forall n, G1.classify n = G2.classify n

  Equivalently:
  (a) Batch nodes: incoming operators lying on a single Fano line generate an
      associative (quaternionic) subalgebra, so any evaluation order produces
      the same result. No race condition exists.
  (b) Tick nodes: non-associativity of the octonionic operators forces a unique
      sequential evaluation order. Different representational orderings of the
      edge list still agree on the Tick/Batch classification.

  This is the COG formalization of Lorentz covariance: causal event
  classification is a physical invariant, not an artefact of the observer's
  representational ordering.
