notes: "Key algebraic chain proved:\n  batchable [i,j,k] = true\n  <-> e_{i+1}, e_{j+1}, e_{k+1} all on one Fano line\n  <->\
  \ they associate: (ei * ej) * ek = ei * (ej * ek)\n  <-> no evaluation-order ambiguity\n\nThe batchable predicate is proved\
  \ permutation-invariant via induction on\nList.Perm using Bool.and_left_comm for the swap case, and List.any_congr\nto lift\
  \ pointwise equality to the any expression.\n\nThe main confluence theorem follows from:\n  1. hedges.filter _ : filtered\
  \ incoming edges are also a Perm\n  2. List.Perm.flatMap : flatMapping the same function over a Perm gives Perm\n  3. batchable_perm\
  \ : batchable is Perm-invariant\n\ntick_nonassoc_example delegates to Octonion.non_associative_witness (already\nproved\
  \ by native_decide in OctonionNonAssoc.lean).\n"
