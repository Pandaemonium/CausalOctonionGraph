notes: |
  Key algebraic chain proved:
    batchable [i,j,k] = true
    <-> e_{i+1}, e_{j+1}, e_{k+1} all on one Fano line
    <-> they associate: (ei * ej) * ek = ei * (ej * ek)
    <-> no evaluation-order ambiguity

  The batchable predicate is proved permutation-invariant via induction on
  List.Perm using Bool.and_left_comm for the swap case, and List.any_congr
  to lift pointwise equality to the any expression.

  The main confluence theorem follows from:
    1. hedges.filter _ : filtered incoming edges are also a Perm
    2. List.Perm.flatMap : flatMapping the same function over a Perm gives Perm
    3. batchable_perm : batchable is Perm-invariant

  tick_nonassoc_example delegates to Octonion.non_associative_witness (already
  proved by native_decide in OctonionNonAssoc.lean).
