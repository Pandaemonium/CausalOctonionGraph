id: ALPHA-001
title: "Fine-structure constant from C\xE2\u0160\u2014O topological phase penalty"
statement: "There exists a purely combinatorial formula F(C\xE2\u0160\u2014O) built from the\ngroup-theoretic data of the\
  \ C\xE2\u0160\u2014O algebra (the Fano automorphism group\nGL(3,2) of order 168, its vacuum stabilizer of e7 (order 24,\
  \ identified as S4 in this encoding), and\nthe U(1) causal cycle structure) such that:\n    F(C\xE2\u0160\u2014O) = alpha\
  \ \xE2\u2030\u02C6 1/137.035999\nwhere alpha is the fine-structure constant (electromagnetic coupling\nat zero momentum\
  \ transfer).\n\nThe COG interpretation: alpha is the topological phase-shift penalty\nincurred when a causal edge routes\
  \ through the U(1) sector of the\nC\xE2\u0160\u2014O algebra.  It is not a free parameter but a fixed geometric ratio\n\
  of the discrete shadow of the gauge group within the causal graph.\n"
