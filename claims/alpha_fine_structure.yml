notes: "EXPERIMENTAL VALUE (CODATA 2022):\n  alpha = 7.2973525693e-3\n  1/alpha = 137.035999084\n\nFANO GROUP DATA (from GAUGE-001):\n\
  \  |GL(3,2)| = |Aut(PG(2,2))| = 168\n  |Stab(e7)| = 24   (order proved in Lean; identified as S4 in this encoding; see RFC-017)\n\
  \  orbit size = 7  (transitive on 7 Fano points)\n\nSTABILIZER IDENTITY (2026-02-24): S4, not SL(2,3). See RFC-017.\n  No\
  \ ALPHA-001 candidate formula uses stabilizer structure, so status is unaffected.\n\nSIMPLE CANDIDATES (none match to better\
  \ than 1%):\n  24/168       = 1/7  \xE2\u2030\u02C6 0.14286    (alpha_s candidate, not alpha)\n  1/168        \xE2\u2030\
  \u02C6 0.00595            (too small by factor ~1.2)\n  7/(168*pi^2) \xE2\u2030\u02C6 0.00423            (too small)\n \
  \ 7/168        = 1/24 \xE2\u2030\u02C6 0.04167    (too large by factor ~5.7)\n\nGATE 1 PROXIES (2026-02-27):\n  alpha_proxy_v1\
  \ = 1/49  \xE2\u2030\u02C6 0.020408  (rel err \xE2\u2030\u02C6 179%)\n  alpha_proxy_v2 = 1/153 \xE2\u2030\u02C6 0.006536\
  \  (rel err \xE2\u2030\u02C6 10.4%)\n  alpha_proxy_v3 = 1/145 \xE2\u2030\u02C6 0.006897  (rel err \xE2\u2030\u02C6 5.5%)\
  \  [closest]\n\nRESEARCH DIRECTION:\n  The correct formula is expected to involve the volume or phase-space\n  measure of\
  \ the U(1) causal loop in C\xE2\u0160\u2014O, not a simple integer ratio.\n  Candidate: alpha = Im(det(C\xE2\u0160\u2014\
  O projector onto U(1) sector)) / (4*pi)\n  where the determinant is computed over the discrete Witt basis.\n\nWARNING:\n\
  \  The history of \"deriving\" alpha from group orders is littered with\n  numerological coincidences (Eddington, Wyler,\
  \ etc.).  The claim must\n  be derived, not fitted.  Fix the combinatorial formula from first\n  principles and THEN check\
  \ whether it matches 1/137; do not\n  reverse-engineer a formula from the answer.\nCLOSURE PACK (2026-02-27):\n  Frozen\
  \ policy bundle:\n    - calc/alpha_policies.json\n  Reproducible estimator:\n    - calc/estimate_alpha_from_policy.py\n\
  \    - calc/estimate_alpha_em.py\n  Governance tests:\n    - calc/test_alpha_policy_governance.py\n  Results artifacts:\n\
  \    - sources/alpha_policy_results.md\n    - sources/alpha_policy_results.json\n  Deterministic full-cone simulation scan:\n\
  \    - calc/alpha_simulation_conditions.json\n    - calc/simulate_alpha_em_scan.py\n    - calc/test_alpha_simulation_scan.py\n\
  \    - sources/alpha_simulation_scan.md\n    - sources/alpha_simulation_scan.json\n\nNO-FIT DECLARATION:\n  Policy rows\
  \ are predeclared and replay-hash locked. No attenuation fitting\n  or output-driven policy selection is used in this closure\
  \ pack.\n"
