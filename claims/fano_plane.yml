id: FANO-001
title: "Fano plane incidence and multiplication structure"
statement: |
  The Fano plane PG(2,2) with the Furey convention (rfc/CONVENTIONS.md §2)
  satisfies:
    (a) 7 points, 7 lines, 3 points per line, 3 lines per point.
    (b) Any 2 distinct points determine exactly 1 line.
    (c) Any 2 distinct lines meet in exactly 1 point.
    (d) The directed cyclic triples generate a sign tensor ε_{ijk}
        that produces an alternative (but non-associative) algebra.
