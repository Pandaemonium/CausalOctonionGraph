id: CFS-003
title: "Vacuum symmetry from octonions with causal-action dynamics"
statement: |
  The vacuum-axis stabilizer structure from octonionic/Fano automorphisms
  (GAUGE-001) is preserved under the discrete causal-action dynamics, so
  vacuum symmetry is algebraically fixed and does not require tunable inputs.
status: partial
lean_file: CausalGraphTheory/Spinors.lean
lean_theorems:
  # Photon operator eigenvalues on vacuum projectors
  # (proves particle/antiparticle charge symmetry at the algebraic level)
  - CausalGraph.e7Left_on_omegaDoubled        # e7·ω  = −i·ω  (vacuum is −i eigenstate)
  - CausalGraph.e7Right_on_omegaDoubled       # ω·e7  = −i·ω  (left = right: ω is symmetric)
  - CausalGraph.e7Left_on_leftVacConjDoubled  # e7·ω† = +i·ω† (conjugate vacuum is +i eigenstate)
  - CausalGraph.e7Right_on_leftVacConjDoubled # ω†·e7 = +i·ω† (left = right: ω† is symmetric)
  # Projector idempotence
  - CausalGraph.omegaDoubled_ne_zero
  - CausalGraph.leftVacConjDoubled_ne_zero
  - CausalGraph.leftVacConjDoubled_idempotent_scaled  # (2ω†)² = 2·(2ω†)
  # Vacuum period-4 corollaries (period-4 holds for the projectors themselves)
  - CausalGraph.vacuum_orbit_exact_period_four
  - CausalGraph.vacuum_orbit_exact_period_four_right
  - CausalGraph.leftVacConjDoubled_left_orbit_exact_period_four
  - CausalGraph.leftVacConjDoubled_right_orbit_exact_period_four
python_test: ""
