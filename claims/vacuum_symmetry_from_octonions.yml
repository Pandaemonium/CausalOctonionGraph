notes: "The eigenvalue theorems e7Left_on_omegaDoubled and e7Right_on_omegaDoubled prove\nthat the vacuum projector \xCF\u2030\
  \ is an eigenstate of the photon operator e7 with\neigenvalue \xE2\u02C6\u2019i, under BOTH left and right multiplication.\
  \ The conjugate vacuum \xCF\u2030\xE2\u20AC\_\nhas eigenvalue +i. Left/right agreement is nontrivial \xE2\u20AC\u201D it\
  \ holds because \xCF\u2030 and \xCF\u2030\xE2\u20AC\_\nare in an especially symmetric position relative to e7 in the Fano\
  \ structure.\n\nPhysical interpretation: the vacuum (generation-1 projector) carries \xE2\u02C6\u2019i charge under\nthe\
  \ photon, the conjugate vacuum carries +i charge. This is the algebraic origin of\nthe particle/antiparticle asymmetry in\
  \ C\xE2\u0160\u2014O.\n\nThe claim that vacuum symmetry is PRESERVED under CFS-style causal dynamics (the\nfull CFS-003\
  \ statement) remains open \xE2\u20AC\u201D the theorems above establish the static\nalgebraic fact, not the dynamical preservation.\n"
