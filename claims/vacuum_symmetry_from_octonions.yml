  - VAC-001
literature:
  - "Finster et al. (2024): Causal Fermion Systems and Octonions, arXiv:2403.00360"
  - "Furey (2016): Charge quantization from a number operator, arXiv:1603.04078"
  - "Todorov and Dubois-Violette (2018): Exceptional Jordan symmetry route, arXiv:1806.09450"
notes: |
  The eigenvalue theorems e7Left_on_omegaDoubled and e7Right_on_omegaDoubled prove
  that the vacuum projector ω is an eigenstate of the photon operator e7 with
  eigenvalue −i, under BOTH left and right multiplication. The conjugate vacuum ω†
  has eigenvalue +i. Left/right agreement is nontrivial — it holds because ω and ω†
  are in an especially symmetric position relative to e7 in the Fano structure.

  Physical interpretation: the vacuum (generation-1 projector) carries −i charge under
  the photon, the conjugate vacuum carries +i charge. This is the algebraic origin of
  the particle/antiparticle asymmetry in C⊗O.

  The claim that vacuum symmetry is PRESERVED under CFS-style causal dynamics (the
  full CFS-003 statement) remains open — the theorems above establish the static
  algebraic fact, not the dynamical preservation.
