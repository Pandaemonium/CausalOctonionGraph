notes: "EXPERIMENTAL VALUE (CODATA 2022):\n  mu = m_p / m_e = 1836.15267343 \xC2\xB1 0.00000011\n\nKNOWN NUMERICAL COINCIDENCES\
  \ (not explanations):\n  6*pi^5       \xE2\u2030\u02C6 1836.1181     (error: 0.002%)  \xE2\u20AC\u201D Armand Wyler, 1969\n\
  \  6*pi^5 + 3/2 \xE2\u2030\u02C6 1837.62       (no improvement)\n  (3/2)*(1/alpha)*ln(1/alpha) \xE2\u2030\u02C6 1836.07\
  \  (Borsanyi et al., numerical)\n\nCOG INTERPRETATION:\n  Electron motif: 1 node cycling through the associative quaternion\n\
  \  subalgebra H \xE2\u0160\u201A O.  No Alternativity Trigger fires; tick overhead = 1.\n\n  Proton motif: 3 nodes (u, u,\
  \ d quarks) exchanging gluon edges on the\n  3 Witt color-plane lines.  Each exchange may trigger the Alternativity\n  Trigger\
  \ (non-associative remainder) requiring extra bookkeeping steps.\n\n  The 1836 overhead is hypothesized to arise from:\n\
  \    - 3 color charge transfers per baryon number cycle\n    - Each transfer traverses O(168) Fano automorphisms\n    -\
  \ Effective overhead \xE2\u2030\u02C6 (number of bookkeeping steps per cycle)\n\nCRITICAL REFRAMING (2026-02-22, Gemini\
  \ feedback):\n  1836 IS NOT A MAGIC INTEGER. Do not prime-factorize it.\n  The physical ratio is \xE2\u2030\u02C6 1836.15267,\
  \ an irrational number.\n\n  In the COG framework, MASS IS GATE DENSITY (thermodynamic limit):\n    - Electron mass ~ sparse\
  \ density of P? (propagation) gates\n      (the L1 associative cycle fires 1 gate per tick, 3 ticks/cycle).\n    - Proton\
  \ mass ~ dense density of S?/S\xE2\u201A\u201A (strong) gates\n      (the color-singlet cycle fires many non-associative\
  \ gates with\n      cost 2 each, over a much longer causal chain).\n  The ratio mu \xE2\u2030\u02C6 1836.15 emerges as the\
  \ thermodynamic LIMIT of the\n  ratio of gate frequencies as the simulation runs long.\n\nGATE DENSITY SIMULATION (revised\
  \ approach, RFC-009 \xC2\xA77b.10):\n  1. Implement electron motif with sign tracking: track (OctIdx, sign).\n     Gate\
  \ density = 1 gate/tick = 1.0 (associative, cost 1 each hop).\n  2. Implement proton motif with cyclic exchange C1\xE2\u2020\
  \u2019C2\xE2\u2020\u2019C3\xE2\u2020\u2019C1 and sign\n     tracking. Count total S?/S\xE2\u201A\u201A gate firings over\
  \ N steps.\n  3. Run N steps. Compute gate_density(proton) / gate_density(electron).\n  4. Let the ratio CONVERGE to a thermodynamic\
  \ limit. Do NOT stop at\n     first recurrence. Run until the ratio stabilizes.\n\nSIGN TRACKING \xE2\u20AC\u201D ARCHITECTURAL\
  \ REQUIREMENT:\n  DO NOT collapse +e\xE2\u201A\u2021 and \xE2\u02C6\u2019e\xE2\u201A\u2021. The signs encode chirality.\
  \ The node\n  state must be (OctIdx, sign) where sign \xE2\u02C6\u02C6 {+1, \xE2\u02C6\u20191}. This is required\n  to correctly\
  \ distinguish attractive from repulsive next-step interactions.\n\nGATE 2 SIMULATION RESULT (2026-02-26, RFC-009 \xC2\xA7\
  7b.10):\n  Script: calc/mass_drag_v2.py\n  Steps: N = 10,000\n  Proton motif  [u1=e1(0), u2=e2(1), d1=e4(3)]:\n    P_nonassoc\
  \ = 10000, P_density = 1.000000 (every tick fires a gate).\n  Electron motif [c1=e1(0), c2=e2(1), c3=e3(2), quaternion H\xE2\
  \u0160\u201AO]:\n    E_nonassoc = 0, E_density = 0.000000 (associative subalgebra).\n  Outcome: DEGENERATE (associative\
  \ baseline \xE2\u20AC\u201D E_density = 0).\n\n  Physical interpretation:\n    The degenerate result CONFIRMS the COG lepton-associativity\
  \ hypothesis\n    (RFC-009 \xC2\xA76.3): leptons do not carry non-associative overhead, baryons do.\n    The proton-to-electron\
  \ mass ratio cannot be expressed as a simple\n    gate-density ratio when E_density=0. The next step (RFC-009 \xC2\xA77b.11)\n\
  \    is to define the electron mass via tick-overhead in the associative\n    limit (cost per hop = 1) vs. the proton's\
  \ non-associative cost (cost > 1).\n"
