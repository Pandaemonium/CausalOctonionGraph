    date: "2026-02-22"
    simulation: "calc/mass_drag.py (asymmetric exchange — BUGGY)"
    rules_version: "RFC-001 Phase II"
    C_e: 3
    C_p: 8
    mu_COG: 2.6667
    mu_exp: 1836.15267343
    status: falsification_datum
    root_cause: |
      Asymmetric exchange schedule: Q[1](Color1) was source in steps 0 and 1
      but never a destination. State of Q[1] was frozen; recurrence trivially
      satisfied for 2/3 quarks. Signs not tracked (+e7 and -e7 collapsed).
  - phase: 11
    date: "2026-02-22"
    simulation: "calc/mass_drag.py (cyclic exchange + sign tracking)"
    rules_version: "RFC-001 Phase II + RFC-009 §3 + RFC-009 §2b.4"
    C_e: 3
    C_p: 11
    mu_COG_naive: 3.6667
    mu_exp: 1836.15267343
    status: falsification_datum
    architectural_corrections: |
      (1) Cyclic exchange C1->C2->C3->C1: each quark is src and dst exactly
          once per 3-step cycle. Every quark state now evolves.
      (2) Sign tracking: node state = (OctIdx, sign) with sign in {+1,-1}.
          Recurrence requires full signed state match PROTON_INIT + all +1 signs.
    interpretation: |
      First signed recurrence at step=21 (7 full C1->C2->C3->C1 cycles),
      tick_cost=11 ticks, naive mu = 11/3 = 3.667.
      Gate density (non-assoc triggers / max_tick): 499-544 per tick (rising).
      Electron gate density = 0 (fully associative L1, no comparison possible).
      250 branches surviving at pruning cap — system is highly branching.
      Still 3 orders of magnitude below mu_exp = 1836.
    open_questions:
      - "The naive cycle-count ratio 3.667 is still far from 1836. Is the
         Fano orbit coverage (PSL(2,7) full orbit) required as the recurrence
         condition, not just the first return to PROTON_INIT?"
      - "The gate density comparison is degenerate: electron has 0 non-assoc
         gates. Should we count ALL gate types (P1 propagation + S1/S2 strong)
         and compare per-generation densities?"
      - "250 branches after 100 steps suggests explosive non-associativity.
         Should the simulation track a 'minimum cost branch' (classical path)
         rather than all branches?"
      - "Does 1836 require running until the gate density ratio has converged
         to a thermodynamic limit? (Gemini 2026-02-22: it is a statistical
         limit, not an integer cycle period.)"
  next_action: |
    RFC-009 drafted (2026-02-22). Two structural fixes required before re-run:
    (1) Add signed state tracking (OctIdx, sign) — see RFC-009 §2b.4.
    (2) Fix proton exchange schedule to cyclic C1→C2→C3→C1 — see RFC-009 §3.
    (3) Switch simulation from recurrence-counting to gate-density measurement.
    Re-run calc/mass_drag.py and report the gate-density ratio as the revised
