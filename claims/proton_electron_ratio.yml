  - GAUGE-001
  - GEN-001
literature:
  - "CODATA 2022: mu = m_p/m_e = 1836.15267343 ± 0.00000011"
  - "Barrow & Tipler (1986): Anthropic Cosmological Principle §5.1"
  - "Duff (2002): Comment on time-variation of fundamental constants, arXiv:hep-th/0208093"
  - "Furey (2018): Three generations, two unbroken gauge symmetries, arXiv:1910.08395"
notes: |
  EXPERIMENTAL VALUE (CODATA 2022):
    mu = m_p / m_e = 1836.15267343 ± 0.00000011

  KNOWN NUMERICAL COINCIDENCES (not explanations):
    6*pi^5       ≈ 1836.1181     (error: 0.002%)  — Armand Wyler, 1969
    6*pi^5 + 3/2 ≈ 1837.62       (no improvement)
    (3/2)*(1/alpha)*ln(1/alpha) ≈ 1836.07  (Borsanyi et al., numerical)

  COG INTERPRETATION:
    Electron motif: 1 node cycling through the associative quaternion
    subalgebra H ⊂ O.  No Alternativity Trigger fires; tick overhead = 1.

    Proton motif: 3 nodes (u, u, d quarks) exchanging gluon edges on the
    3 Witt color-plane lines.  Each exchange may trigger the Alternativity
    Trigger (non-associative remainder) requiring extra bookkeeping steps.

    The 1836 overhead is hypothesized to arise from:
      - 3 color charge transfers per baryon number cycle
      - Each transfer traverses O(168) Fano automorphisms
      - Effective overhead ≈ (number of bookkeeping steps per cycle)

  CRITICAL REFRAMING (2026-02-22, Gemini feedback):
    1836 IS NOT A MAGIC INTEGER. Do not prime-factorize it.
    The physical ratio is ≈ 1836.15267, an irrational number.

    In the COG framework, MASS IS GATE DENSITY (thermodynamic limit):
      - Electron mass ~ sparse density of P₁ (propagation) gates
        (the L1 associative cycle fires 1 gate per tick, 3 ticks/cycle).
      - Proton mass ~ dense density of S₁/S₂ (strong) gates
        (the color-singlet cycle fires many non-associative gates with
        cost 2 each, over a much longer causal chain).
    The ratio mu ≈ 1836.15 emerges as the thermodynamic LIMIT of the
    ratio of gate frequencies as the simulation runs long.

  GATE DENSITY SIMULATION (revised approach, RFC-009 §7b.10):
    1. Implement electron motif with sign tracking: track (OctIdx, sign).
       Gate density = 1 gate/tick = 1.0 (associative, cost 1 each hop).
    2. Implement proton motif with cyclic exchange C1→C2→C3→C1 and sign
       tracking. Count total S₁/S₂ gate firings over N steps.
    3. Run N steps. Compute gate_density(proton) / gate_density(electron).
    4. Let the ratio CONVERGE to a thermodynamic limit. Do NOT stop at
       first recurrence. Run until the ratio stabilizes.

  SIGN TRACKING — ARCHITECTURAL REQUIREMENT:
    DO NOT collapse +e₇ and −e₇. The signs encode chirality. The node
    state must be (OctIdx, sign) where sign ∈ {+1, −1}. This is required
    to correctly distinguish attractive from repulsive next-step interactions.

  WARNING:
    The 6*pi^5 coincidence has been known since 1969 and is widely
    regarded as numerological.  This claim MUST be derived from the
    COG update rules and NOT post-hoc fitted.  Fix the motif structure
    from physical reasoning FIRST; then run the simulation.
simulation_records:
