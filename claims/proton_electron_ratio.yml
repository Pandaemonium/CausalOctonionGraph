id: MU-001
title: "Proton-to-electron mass ratio from octonionic tri-state cycle overhead"
statement: |
  The proton-to-electron mass ratio mu ≈ 1836.152673 equals, in the
  COG framework, the ratio of the forced Tick evaluation overhead of
  maintaining a stable color-singlet tri-state cycle (proton motif) to
  that of a single propagating lepton state (electron motif):
      mu = tick_overhead(proton_motif) / tick_overhead(electron_motif)

  The proton motif consists of three color-charged nodes connected by
  SU(3) Fano-cycle edges, requiring sustained non-associative bookkeeping
  (the Alternativity Trigger) that the electron motif, cycling through
  an associative subalgebra, does not.
status: revised_pending
lean_file: CausalGraphTheory/Constants.lean
lean_theorems:
  - CausalGraph.proton_motif_def
  - CausalGraph.lepton_motif_def
  - CausalGraph.mu_tick_ratio_stub
python_test: calc/mass_drag.py
depends_on:
