id: CAUS-001
title: "Reachability defines a strict partial order on the causal graph"
statement: |
  The reachability relation on a CausalGraph G is a strict partial order:

    1. Irreflexivity:  not (reachable G n n)
    2. Asymmetry:      reachable G m n -> not (reachable G n m)
    3. Transitivity:   reachable G m k -> reachable G k n -> reachable G m n

  These follow from the acyclicity invariant: every edge e in G satisfies
  e.source < e.target (Nat ordering). Hence any directed path m ->* n
  implies m < n (by transitivity of Nat.<), which immediately gives
  irreflexivity and asymmetry.

  The causal future and past of a node are decidable:
    directFuture G n = {k | n -> k in G}  (all targets of edges from n)
    directPast G n   = {k | k -> n in G}  (all sources of edges to n)

  Two nodes m, n are causally disconnected iff neither m ->* n nor n ->* m.
  Disconnectedness is symmetric by definition.

