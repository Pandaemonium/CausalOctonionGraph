notes: "The key lemma is reachable_implies_lt: any reachable pair (m, n) satisfies\nm < n in the natural number ordering on\
  \ node IDs. This follows from the\nCausalGraph.acyclic invariant (e.source < e.target for all edges e).\n\nProof by induction\
  \ on the reachable relation:\n  - Base case (edge): directly from acyclic\n  - Inductive step (trans): by Nat.lt_trans\n\
  \nIrreflexivity and asymmetry are immediate corollaries of reachable_implies_lt\nsince m < n implies m != n (irrefl) and\
  \ n is not < m (asymm).\n\nThe directFuture/directPast sets are computed by List.filter on the edge list,\nusing Decidable\
  \ coercion of Nat.decEq. The filter proofs use decide_eq_true_eq\nto convert Bool filter results to Prop-level equalities.\n\
  \nNote: common_future_lt and common_past_gt theorems show that common causal\ndescendants/ancestors must respect the ID\
  \ ordering.\n"
