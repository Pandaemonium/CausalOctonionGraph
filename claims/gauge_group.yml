notes: |
  168 = 2Â³ Ã— 3 Ã— 7 = |GL(3,2)| = |PSL(2,7)|.
  Vacuum stabilizer order is 24; in this encoding the stabilizer is identified with S4 (see RFC-017).
  Orbit-stabilizer: |GL(3,2)| = 7 Ã— 24 = 168. âœ“
  The 3 vacuum lines are the Witt basis pairs from CONVENTIONS.md section 5.2:
    Line 2: {e1, e7, e6}  (pair e6, e1)
    Line 4: {e2, e5, e7}  (pair e2, e5)
    Line 5: {e3, e4, e7}  (pair e3, e4)
  The 24-element vacuum stabilizer is the discrete SU(3) acting on the
  color-charged sector; the 7-element orbit recovers the 7 color phases.

  Additional finite action checks (VacuumStabilizerAction.lean):
  - The Witt-pair cycle element is explicitly in the stabilizer list.
  - The induced action on 3 Witt-pair labels is exactly S3 (all 6 permutations).

  Additional quotient/structure checks (VacuumStabilizerQuotient.lean, VacuumStabilizerStructure.lean):
  - induced action passes finite homomorphism checks;
  - kernel size is 4, normality check passes, index is 6;
  - explicit transposition witness is present in the stabilizer action;
  - order histogram is [(1,1), (2,9), (4,6), (3,8)] with 9 involutions.

  S4 action identification (VacuumStabilizerS4.lean):
  - The 4 non-vacuum lines are canonically [0,1,3,6].
  - The stabilizer induces all 24 permutations on these 4 lines (exact S4 action).
  - Faithfulness check passes (only identity acts trivially on the 4-line set).
  - Explicit lift map S4 -> stabilizer is defined and passes left/right inverse checks.

  Status note (2026-02-24):
  - The stabilizer order-24 result is proved.
  - The specific isomorphism label issue is resolved in this encoding: S4 is supported by the order profile and explicit list-level action checks; the remaining gap is a direct link theorem between GaugeGroup.lean and VacuumStabilizerS4.lean artifacts.
