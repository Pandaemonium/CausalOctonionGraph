notes: "SUPERSESSION RATIONALE (2026-02-25):\n  This claim is incompatible with the current vacuum model in RFC-013,\n  RFC-018,\
  \ and RFC-019:\n  - vacuum is represented algebraically as omega = 1/2(1 + i e7),\n    with a period-4 phase orbit under\
  \ L_{e7};\n  - phase-only vacuum steps are tracked via the dual-clock semantics\n    (tau_topo, tau_int), not a static node\
  \ label.\n\n  Kept only as historical proof artifact for the legacy label-based kernel.\n\nBoth theorems proved (no sorry):\n\
  \nvacuum_is_stable: If every node in G carries the .vacuum label, then so\n  does every node in (step G).  Proof by case-split\
  \ on G.nodes.getLast?:\n  - Empty case: step creates genesisNode {label := .vacuum}; proved by\n    unfold step; split;\
  \ simp_all (contradiction) / rfl (none branch).\n  - Non-empty case: step_nodes_of_some shows (step G).nodes = G.nodes ++\n\
  \    [newNode] where newNode.label = .vacuum; membership cases close by\n    hypothesis and rfl.\n\nvacuum_annihilates_operators:\
  \ O * (0 : ComplexOctonion Z) = 0.\n  Proof strategy: Octonion.ext reduces to 8 component goals.\n  The private helper zero_c_eq\
  \ : (0 : Octonion R).c k = 0 := rfl makes\n  simp substitute zero components; simp [FormalComplex.ext_iff] closes\n  each\
  \ remaining FormalComplex equality goal.\n"
