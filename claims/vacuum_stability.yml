id: VAC-001
title: Stability of the Sterile Vacuum
statement: '[SUPERSEDED] Legacy claim from the label-based kernel.

  This statement modeled vacuum as a fixed-point node label (`.vacuum`) and

  as the zero state under operator action. The current model treats vacuum as

  the algebraic projector orbit of omega under e7 action, not as a static

  metadata label fixed point.

  '
