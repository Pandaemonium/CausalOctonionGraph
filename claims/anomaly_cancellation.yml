id: ANOM-001
title: Anomaly Consistency Under Declared Q_num Assignment
statement: >
  Given the declared Witt-occupation charge assignment Q_num
  (N=0 -> 0, N=1 -> +2/3, N=2 -> -1/3, N=3 -> -1),
  the anomaly sums satisfy:
    1) Tr[Q_num] = 0 on the primary 8-state ideal,
    2) Tr[Q_num^3]_primary + Tr[Q_num^3]_dual = 0 on the combined theory.
  This is a consistency result for the declared assignment, not a derivation
  of quark/lepton charges from raw COG state coefficients.
