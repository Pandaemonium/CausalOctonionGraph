id: THETA-001
title: Theta_QCD Structural CP Invariance (v2 Lane)
status: supported_bridge
closure_scope: structure_first
canonical_profile:
  axioms:
    - dag
    - cxo_over_unity
    - projective_lightcone_update
  kernel_profile: cog_v2_projective_unity_v1
  projector_id: pi_unity_axis_dominance_v1

statement: >
  Under the v2 canonical profile, Fano orientation-flip and exact sign-balance
  provide a structural CP-invariance witness for a zero strong-sector CP-odd
  residual at the discrete level. This claim is explicitly scoped to
  structure-first derivation under a locked linear bridge-map policy; it does
  not assert full continuum value closure in this stage.

target_tonight:
  objective: strengthen_supported_bridge
  excludes:
    - proved_core_promotion
    - full_value_closure_claim
  success_condition: >
    Expanded weak-leakage stress lanes and continuum-bridge diagnostics remain
    replay-stable and all required THETA-001 contract gates stay green.

contract_gates:
  required:
    - rfc083
  rfc083:
    closure_scope: structure_first
    bridge_contract_id: theta_cp_bridge_v2
    bridge_observable_id: theta_cp_odd_residual_v2
    weak_leakage_artifact: cog_v2/sources/theta001_bridge_closure_v2.json
    eft_bridge_artifact: cog_v2/sources/theta001_bridge_closure_v2.json
    eft_map_artifact: cog_v2/sources/theta001_eft_bridge_v2.json
    continuum_bridge_artifact: cog_v2/sources/theta001_continuum_bridge_v2.json
    triplet_leakage_artifact: cog_v2/sources/triplet_coherence_e000_leakage_v1.json
    triplet_robustness_artifact: cog_v2/sources/triplet_coherence_e000_robustness_v1.json
    closure_packet_artifact: cog_v2/sources/theta001_supported_bridge_closure_packet_v2.json
    skeptic_review_artifact: cog_v2/sources/theta001_skeptic_review_v2.json
    skeptic_verdict: PASS_WITH_LIMITS

continuum_identification_contract:
  rfc_id: RFC-003
  policy_id: theta_continuum_linear_identification_v1
  selection_policy_id: theta_map_identification_linear_unit_v1
  map_id: linear_scale_1_v1
  discrete_correction_envelope_id: theta_discrete_correction_envelope_v1
  discrete_correction_robustness_id: theta_discrete_correction_envelope_robustness_v1
  coarse_grain_operator: depth_normalized_residual_mean_v1

bridge_map_policy:
  primary_lane:
    mode: linear
    map_id: linear_scale_1_v1
    cp_odd_all_hold_required: true
    zero_anchor_all_hold_required: true
  periodic_stub_lane:
    source_artifact: cog_v2/sources/theta001_bridge_closure_v2.json
    status_required: stub_non_blocking
    promotion_blocking_required: false

lean_file: cog_v2/lean/CausalGraphV2/ThetaQCD.lean
lean_theorems:
  - CausalGraphV2.cpMap_involution
  - CausalGraphV2.orientationFlip_preserves_incidence
  - CausalGraphV2.fano_sign_pos_count_eq_21
  - CausalGraphV2.fano_sign_neg_count_eq_21
  - CausalGraphV2.fanoSignOrderedSum_zero
  - CausalGraphV2.discreteCpResidual_zero
  - CausalGraphV2.theta_zero_if_direct_bridge
  - CausalGraphV2.theta_zero_if_linear_bridge
  - CausalGraphV2.theta_zero_if_affine_bridge
  - CausalGraphV2.theta_zero_if_zero_anchored_bridge
  - CausalGraphV2.theta_zero_if_continuum_identification_hyp
  - CausalGraphV2.theta_zero_if_continuum_bridge_and_no_leakage
  - CausalGraphV2.discreteTopologicalCharge_v1_zero
  - CausalGraphV2.thetaContinuumCoeff_linear_v1_zero
  - CausalGraphV2.fTildeFCoeff_proxy_linear_v1_zero
  - CausalGraphV2.theta_qcd_zero_under_locked_identification_v1
  - CausalGraphV2.depthIndexedResidual_v1_zero
  - CausalGraphV2.depthNormalizedResidual_v1_zero
  - CausalGraphV2.discreteCorrectionEnvelopeReady_v1_holds
  - CausalGraphV2.theta_zero_if_depth_contract_holds

python_test:
  - cog_v2/python/tests/test_kernel_projective_unity.py
  - cog_v2/calc/test_theta001_cp_invariant_v2.py
  - cog_v2/calc/test_theta001_bridge_closure_v2.py
  - cog_v2/calc/test_theta_eft_map_v2.py
  - cog_v2/calc/test_theta001_continuum_bridge_v2.py
  - cog_v2/calc/test_triplet_coherence_e000_leakage_v1.py
  - cog_v2/calc/test_triplet_coherence_e000_robustness_v1.py
  - cog_v2/calc/test_theta001_supported_bridge_closure_packet_v2.py
python_check:
  - python -m cog_v2.calc.build_theta001_bridge_closure_v2 --write-sources
  - python cog_v2/scripts/run_theta_eft_sweep_v2.py --write-sources
  - python -m cog_v2.calc.build_theta001_continuum_bridge_v2 --write-sources
  - python -m cog_v2.calc.build_triplet_coherence_e000_leakage_v1 --write-sources
  - python -m cog_v2.calc.build_triplet_coherence_e000_robustness_v1 --write-sources
  - python -m cog_v2.calc.build_theta001_supported_bridge_closure_packet_v2 --write-sources
  - python cog_v2/scripts/validate_claim_contracts_v2.py --root . --claims-dir cog_v2/claims

bridge_assumptions:
  - "Discrete CP residual witness corresponds to the continuum theta_QCD term."
  - "Weak-sector CP violation does not leak into strong-sector residual under canonical update."
  - "Triplet coherence vs e000 leakage probe captures relevant structure-first non-e000 stability effects."

falsification_condition: >
  Claim is falsified if a deterministic v2 weak-leakage test shows a non-zero
  strong-sector CP-odd residual under declared CP-asymmetric perturbations.

falsification_attempts:
  - id: theta_v2_weak_leakage_grid_v1
    artifact: cog_v2/sources/theta001_bridge_closure_v2.json
    method: "deep-cone weak-kick x phase-shift grid"
    outcome: "no strong-sector CP-odd residual detected"
  - id: theta_v2_ckm_like_grid_v1
    artifact: cog_v2/sources/theta001_bridge_closure_v2.json
    method: "deep-cone CKM-like transport injection grid"
    outcome: "no strong-sector CP-odd residual detected"
  - id: theta_v2_eft_map_probe_v1
    artifact: cog_v2/sources/theta001_eft_bridge_v2.json
    method: "continuum bridge map sweep + q_top proxy cp-odd diagnostics"
    outcome: "cp-odd proxy consistency and bridge-map contract diagnostics recorded"
  - id: theta_v2_continuum_scaling_probe_v1
    artifact: cog_v2/sources/theta001_continuum_bridge_v2.json
    method: "finite-size depth sweep and normalized residual convergence diagnostics"
    outcome: "extended depth lanes remain zero-residual with stable convergence diagnostics"
  - id: theta_v2_triplet_e000_probe_v1
    artifact: cog_v2/sources/triplet_coherence_e000_leakage_v1.json
    method: "triplet coherence vs e000 leakage directional hypothesis probe"
    outcome: "coherent-triplet and broken-state scenarios separate with preregistered directional checks"
  - id: theta_v2_triplet_e000_robustness_probe_v1
    artifact: cog_v2/sources/triplet_coherence_e000_robustness_v1.json
    method: "multi-pair deterministic robustness sweep over triplet coherence and e000 leakage checks"
    outcome: "critical checks hold across all pairs; supporting checks hold by majority with robustness lane ready"

gates:
  - id: gate_1
    description: Lean structural witnesses compile in v2 lane.
    done: true
  - id: gate_2
    description: Python deterministic witness and replay tests pass in v2 lane.
    done: true
  - id: gate_3
    description: Independent skeptic review with model-family diversity attached.
    done: true
